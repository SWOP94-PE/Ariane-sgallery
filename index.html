<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariane Brial — Photographie</title>
<meta name="description" content="Portfolio photographique">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <button class="menu-btn" id="menu-btn" aria-label="Ouvrir le menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="header-inner">
    <span class="frame-tag">35mm — N° 1</span>
    <h1 class="site-title">Ariane Brial</h1>
    <span class="site-sub">photographie</span>
  </div>
</header>

<!-- Panneau latéral (menu) -->
<div class="nav-overlay" id="nav-overlay"></div>
<nav class="side-panel" id="side-panel" aria-hidden="true">
  <div class="side-panel-head">
    <span class="side-panel-title">Séries</span>
    <button class="panel-close" id="panel-close" aria-label="Fermer le menu">✕</button>
  </div>
  <ul class="series-list" id="series-list">
    <!-- Généré automatiquement par script.js -->
  </ul>
</nav>

<main>

  <!-- Vue : page d'accueil -->
  <section id="view-home" class="view">
    <div class="hero" id="hero">
      <div class="hero-frame">
        <div class="hero-image" style="background-image:url('photos/hero.jpeg')"></div>
        <div class="sprockets" aria-hidden="true"></div>
      </div>
      <p class="hero-caption">Si tendre est la vie — argentique &amp; numérique</p>
    </div>

    <div class="series-intro">
      <h2 class="series-intro-title">Explorer les séries</h2>
      <div class="series-grid" id="series-grid">
        <!-- Généré automatiquement par script.js -->
      </div>
    </div>
  </section>

  <!-- Vue : galerie d'une série -->
  <section id="view-series" class="view" hidden>
    <div class="series-header">
      <button class="back-link" id="back-link">← Accueil</button>
      <h2 class="series-title" id="series-title"></h2>
      <span class="frame-tag" id="series-count"></span>
    </div>
    <div class="gallery" id="gallery">
      <!-- Généré automatiquement par script.js -->
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-name">Ariane Brial</p>
    <p class="footer-contact">Contact : paulemilebrial@gmail.com</p>
    <p class="footer-roll">FIN DE PELLICULE — © <span id="year"></span></p>
  </div>
</footer>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lightbox-close" id="lightbox-close" aria-label="Fermer">✕</button>
  <button class="lightbox-prev" id="lightbox-prev" aria-label="Précédent">‹</button>
  <button class="lightbox-next" id="lightbox-next" aria-label="Suivant">›</button>
  <figure class="lightbox-figure">
    <img id="lightbox-img" src="" alt="">
    <figcaption id="lightbox-caption"></figcaption>
  </figure>
</div>

<script src="script.js"></script>
</body>
</html>
